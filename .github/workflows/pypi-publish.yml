name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. 1.2.3)"
        required: true
        type: string

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/vitriolic

    permissions:
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Build wheels
        run: uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
